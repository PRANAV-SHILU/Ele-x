<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ele-x | LOGIN</title>

    <style>
        body {
            background-color: orange;
            font-family: arial, sans-serif;
            align-items: center;
            justify-content: center;
            display: flex;
            height: 100vh;
        }


        /*fixed*/
        nav {
            background-color: #0d0d0d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            padding-left: 30px;
            border-bottom: 1px solid #333;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        nav .logo {
            font-size: 24px;
            font-weight: bold;
        }

        nav .menu a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
        }

        nav a:hover {
            color: #ff6600;
        }

        .menu {
            margin-left: 400px;
            margin-right: 53px;
        }

        .logo {
            color: white;
        }

        /*end*/

        .login {
            background: linear-gradient(to bottom, #222, #000);
            color: orange;
            padding: 20px;
            width: 300px;
            height: 330px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 10px 30px 55px rgba(0, 0, 0, 50);
            margin-top: -45px;
            margin-bottom: -80px;
        }

        .remember {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        input {
            padding: 8PX;
            border-radius: 4px;
            background-color: #333;
            color: #fff;
            border: none;
            outline: none;
        }

        h1 {
            margin-bottom: 20px;
            color: white;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            text-align: left;
            font-size: 14px;
        }

        button {
            background: orange;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }

        button:hover {
            background: #e6b800;
        }

        a {
            color: orange;

        }

        a:hover {
            color: yellow;
        }
    </style>

</head>

<body>

    <nav>
        <div class="logo">Ele-x</div>
        <div class="menu">
            <a href="HOME.HTML">Home</a>
            <a href="SHOPNOW.HTML">Shop Now</a>
            <a href="MEGADEALS.HTML">Mega Deals</a>
            <a href="VOUCHER.HTML">Vouchers</a>
            <a href="BLOGFAQ.HTML">Blogs & FAQs</a>
            <a href="ABOUTUS.HTML">About Us</a>
            <a href="LOGIN.HTML">Login</a>
        </div>
    </nav>



    <div class="login">
        <h1>Login</h1>

        <form method="post" action="HOME.HTML" onsubmit="alert('Login Successfully');">

            <!-- <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username"> -->

            <label for="Email">Email</label>
            <input type="email" id="Email" placeholder="Enter E-mail address" required>

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password" required>

            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me</label>
            </div>

            <button type="submit">LET'S GO</button>

            <p>Don't have an account ? <a href="REGISTER.HTML">Register</a></p>
        </form>
    </div>

</body>

</html>
