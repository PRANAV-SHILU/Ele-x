<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN</title>

    <style>
        
        body
        {
            background-color: orange;
            font-family: arial, sans-serif;
            align-items: center;
            justify-content: center;
            display: flex;
            height: 100vh;
        }
        .login
        {
            background: linear-gradient(to bottom,#222,#000);
            color: orange;
            padding: 20px;
            width: 300px;
            text-align: center;
            border-radius: 8px;
            box-shadow: 10px 30px 55px rgba(0, 0,0, 50);
        }
        .remember
        {
            display: flex;
            gap: 5px;
            align-items: center;
        }
        input
        {
            padding: 8PX;
            border-radius: 4px;
            background-color: #333;
            color: #fff;
            border: none;
            outline: none;
        }
        h1
        {
            margin-bottom: 20px;
        }
        form
        {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        label
        {
            text-align: left;
            font-size: 14px;
        }
        button
        {
            background: orange;
            padding: 10px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            border: none;
        }
        button:hover
        {
            background: #e6b800;
        }

    </style>

</head>
<body>
    
    <div class="login">
        <h1>Login</h1>

        <form mathod="post">

            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username">

            <label for="Email">Email</label>
            <input type="email" id="Email" placeholder="Enter E-mail address">

            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">

            <div class="remember">
                <input type="checkbox" id="remember">
                <label for="remember">Remember me</label>
            </div>

            <button type="submit">LET'S GO</button>
        </form>
    </div>

</body>
</html>
