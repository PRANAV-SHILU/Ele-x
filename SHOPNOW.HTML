<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Ele-x | Shop Now</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0d0d0d;
            color: white;
        }

        /*fixed*/
        nav {
            background-color: #0d0d0d;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            padding-left: 30px;
            border-bottom: 1px solid #333;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
        }

        nav .logo {
            font-size: 24px;
            font-weight: bold;
        }

        nav .menu a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
        }

        nav a:hover {
            color: #ff6600;
        }

        .menu {
            margin-right: 53px;
        }

        /*end*/



        h1 {
            text-align: center;
            margin: 30px 0 10px;
            font-size: 36px;
        }

        .filters {
            text-align: center;
            margin-bottom: 30px;
        }

        .filters button {
            background-color: #ff8000;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            padding: 0 50px 50px;
        }

        .product {
            background-color: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .product img {
            width: 100px;
            height: 100px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .product h3 {
            margin: 10px 0 5px;
            font-size: 18px;
        }

        .product p {
            margin: 5px 0 15px;
            font-size: 16px;
        }

        .product button {
            background-color: #ff8000;
            color: white;
            border: none;
            padding: 8px 15px;
            margin: 5px;
            border-radius: 5px;
            cursor: pointer;
        }

        .hidden {
            display: none !important;
        }

        .content {
            margin-top: 100px;
        }

        .content h1 {
            color: #ff6600;
            margin-bottom: 35px;
        }
    </style>
</head>

<body>

    <nav>
        <div class="logo">Ele-x</div>
        <div class="menu">
            <a href="HOME.HTML">Home</a>
            <a href="SHOPNOW.HTML">Shop Now</a>
            <a href="MEGADEALS.HTML">Mega Deals</a>
            <a href="VOUCHER.HTML">Vouchers</a>
            <a href="BLOGFAQ.HTML">Blogs & FAQs</a>
            <a href="ABOUTUS.HTML">About Us</a>
            <a href="LOGIN.HTML">Login</a>
        </div>
    </nav>

    <div class="content">
        <h1>Shop Now</h1>
        <div class="filters">
            <button onclick="showAll()">All</button>
            <button onclick="filterCategory('electronics')">Electronics</button>
            <button onclick="filterCategory('fashion')">Fashion</button>
            <button onclick="filterCategory('home')">Home Appliance</button>
        </div>

        <div class="products" id="all-products">
            <!-- Electronics -->
            <div class="product electronics">
                <img src="https://via.placeholder.com/100" alt="Samsung S20">
                <h3>Samsung S20</h3>
                <p>₹ 29,999</p>
                <button>Add to Cart</button>
                <button>View Details</button>
            </div>
            <div class="product electronics">
                <img src="https://via.placeholder.com/100" alt="Smart LED TV">
                <h3>Smart LED TV 50'</h3>
                <p>₹ 34,999</p>
                <button>Add to Cart</button>
                <button>View Details</button>
            </div>
            <div class="product electronics">
                <img src="https://via.placeholder.com/100" alt="Bluetooth Speaker">
                <h3>Bluetooth Speaker</h3>
                <p>₹ 3,499</p>
                <button>Add to Cart</button>
                <button>View Details</button>
            </div>
            <div class="product electronics">
                <img src="https://via.placeholder.com/100" alt="Smartwatch">
                <h3>Smartwatch Pro Series 8</h3>
                <p>₹ 3,499</p>
                <button>Add to Cart</button>
                <button>View Details</button>
            </div>
            <div class="product electronics">
                <img src="https://via.placeholder.com/100" alt="Gaming Laptop">
                <h3>Gaming Laptop RTX 8060</h3>
                <p>₹ 84,990</p>
                <button>Add to Cart</button>
                <button>View Details</button>
            </div>

            <!-- Fashion -->
            <div class="product fashion">
                <img src="https://via.placeholder.com/100" alt="Shards Sleere">
                <h3>Shards Sleere</h3>
                <p>₹ 1,999</p>
                <button>Add to Cart</button>
                <button>View Details</button>
            </div>

            <!-- Home Appliance -->
            <div class="product home">
                <img src="https://via.placeholder.com/100" alt="Washing Machine">
                <h3>Washing Machine</h3>
                <p>₹ 23,999</p>
                <button>Add to Cart</button>
                <button>View Details</button>
            </div>
        </div>
    </div>

    <script>
        function showAll() {
            var items = document.querySelectorAll('.product');
            items.forEach(function (item) {
                item.classList.remove('hidden');
            });
        }

        function filterCategory(category) {
            var items = document.querySelectorAll('.product');
            items.forEach(function (item) {
                if (item.classList.contains(category)) {
                    item.classList.remove('hidden');
                } else {
                    item.classList.add('hidden');
                }
            });
        }
    </script>

</body>

</html>
